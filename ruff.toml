# Strict ruff config for the whole monorepo.
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    "node_modules",
    "web",
    "build",
    "dist",
    "apps/api/alembic/versions",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # bugbear
    "C4",  # comprehensions
    "SIM", # simplify
    "PIE", # flake8-pie
    "RET", # return-style
    "RUF", # ruff-specific
    "PL",  # pylint (curated)
    "TID", # tidy imports
    "ARG", # unused-arguments
    "PTH", # pathlib
    "G",   # logging
    "S",   # bandit security
    "ASYNC",
]
ignore = [
    "COM812",  # conflict with formatter
    "ISC001",  # conflict with formatter
    "PLR0913", # too many args (Pydantic models need them)
    "PLR2004", # magic value (tests / fixtures use it)
    "D",       # pydocstyle — handled by griffe / mkdocs later
]

[lint.per-file-ignores]
# Tests get asserts, magic numbers, type annotations relaxed
"**/tests/**" = ["S101", "PLR2004", "ARG", "ANN", "SLF001"]
# Alembic migrations are autogenerated — ignore everything
"apps/api/alembic/versions/**" = ["ALL"]
# Empty __init__.py re-exports are fine
"**/__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"

[lint.isort]
known-first-party = [
    "gw2analytics_api",
    "gw2_core",
    "gw2_evtc_parser",
    "gw2_analytics",
    "gw2_api_client",
]
