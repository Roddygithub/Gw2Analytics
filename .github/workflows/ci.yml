# GitHub Actions: lint + type-check + test the gw2analytics monorepo.
#
# Mirrors the local pre-commit + pipeline (uv run ruff check,
# uv run ruff format --check, uv run mypy libs apps --no-incremental,
# uv run pytest) so a PR cannot regress any of these gates.
#
# pytest-env injects the docker-compose dev credentials at session
# startup, so this workflow does not need any GitHub repository
# secrets. The Postgres-dependent test_uploads_e2e.py self-skips
# via the `db_reachable` fixture when no docker-compose postgres is
# reachable, so the test job is green on a clean runner.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit is
# pushed to the same PR (saves CI minutes on stale branches).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + test on Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history for `uv sync --frozen` and exact blame.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync workspace dependencies (frozen lock)
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check --output-format=concise

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Mypy
        run: uv run mypy libs apps --no-incremental

      - name: Pytest
        run: uv run pytest --tb=line -q
