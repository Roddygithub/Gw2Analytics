# v0.10.6+ (post-PR-#69 followup): dependabot creates one
# remote branch per dep-update PR. To stop those branches
# from accumulating (``github.delete_branch_on_merge`` is a
# GitHub repo setting, NOT a dependabot.yml key), enable
# **Settings → General → Pull Requests → "Automatically
# delete head branches"** in the GitHub UI. See CONTRIBUTING.md
# §"Branch cleanup after merge" for the rationale + a
# one-sweep cleanup snippet for pre-existing accumulated
# branches.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"

  # v0.10.6 plan 136: dependabot emits invalid major tags for
  # these GitHub-owned or developer actions (the v7 ref does not
  # exist on the Marketplace). The `ignore` block + the new
  # `.github/workflows/dependabot-auto-merge.yml` (which has its
  # own `paths-ignore` for `.github/**`) together force human
  # review on workflow edits and cap dependabot to minor + patch
  # updates for these specific actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["major"]
      - dependency-name: "actions/upload-artifact"
        update-types: ["major"]
      - dependency-name: "actions/setup-node"
        update-types: ["major"]
      - dependency-name: "astral-sh/setup-uv"
        update-types: ["major"]
      - dependency-name: "pnpm/action-setup"
        update-types: ["major"]
      # v0.10.6 plan 137 (round-4 code-review fix):
      # `dependabot/fetch-metadata` is itself a GitHub action
      # subject to the same dependabot-metadata bug AND a
      # critical security gate (it scopes our auto-merge policy).
      # We ignore ALL dependabot bumps (major + minor + patch)
      # for this one action and rely on operator-initiated manual
      # updates via PR. This prevents a dependabot-emitted invalid
      # ref (any semver bucket) from silently breaking the
      # auto-merge workflow. Future hardening: switch to a SHA
      # pin (`dependabot/fetch-metadata@<commit-sha>`) once the
      # enterprise org-wide SHA-pin convention lands.
      - dependency-name: "dependabot/fetch-metadata"
        update-types:
          - "major"
          - "minor"
          - "patch"
