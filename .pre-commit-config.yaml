repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^(libs|apps)/.*\.py$
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - sqlalchemy
          - alembic
          - fastapi
          - fastapi-mcp
          - pytest
          - minio
          - uvicorn
        # ``--disable-error-code=misc`` silences two noise categories
        # that fire in the pre-commit hook venv (a subset of the
        # project's full workspace venv):
        #   - "Class cannot subclass X (has type 'Any')" when a
        #     third-party package lacks stubs in the hook venv
        #   - "Untyped decorator" on pytest fixtures (pytest's
        #     decorator types are not in the stdlib stubs)
        # The project's own mypy run (``uv run mypy libs apps``) gets
        # the full workspace venv and resolves these correctly.
        args: [--disable-error-code=misc]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements
