[mypy]
# v0.10.5 dep-cycle Phase 1C: explicit_package_bases=True tells
# mypy to treat each top-level wd on the CLI as a separate package
# root for module resolution.
explicit_package_bases = True

# v0.10.5 dep-cycle Phase 1C-round-2: add mypy_path listing the
# workspace src/ roots so mypy resolves src-layout packages
# correctly as themselves (`gw2_analytics.aggregate`,
# `gw2_core.models`, etc.) instead of falling back to
# `libs.gw2_analytics.src.gw2_analytics.aggregate` (the path-based
# name that's already in conflict with uv's editable-install
# `gw2_analytics.aggregate`). With mypy_path set, mypy knows that
# each src/ dir IS a package base, so aggregate.py resolves once
# as `gw2_analytics.aggregate` -- no "Source file found twice"
# error.
#
# Test conftest.py files are NOT in any src/ root, so they fall
# back to the monorepo root as their package base and resolve
# uniquely as `apps.api.tests.conftest`,
# `libs.gw2_core.tests.conftest`, etc. -- collision avoided
# without an exclude regex.
mypy_path = libs/gw2_analytics/src:libs/gw2_core/src:libs/gw2_evtc_parser/src:libs/gw2_api_client/src:apps/api/src

strict = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
python_version = 3.12
plugins = pydantic.mypy

# Files we ignore globally (newline-separated regexes).
exclude = (?x)(\.venv|node_modules|web/|build/|dist/|apps/api/alembic/versions/)

# Tests can have looser typing
[mypy-tests.*]
disallow_untyped_defs = False

# External libs sometimes lack complete annotations
[mypy-pydantic.*]
ignore_missing_imports = True

# Workspace packages (`uv` workspace == editable-installed into the venv).
# When mypy runs from `apps/api/tests/*.py` it cannot resolve cross-package
# imports even though pytest can (pytest's rootdir-discovery adds tests/
# to sys.path; mypy consults the type-stub path instead). Permitting
# `ignore_missing_imports` here lets e2e test files import the FastAPI
# app registry + the cross-account timeline aggregator without inline
# `# type: ignore[import-not-found]`. Audit + commit-message context:
# advisor-plans/F2 (workspace-stub patch).

[mypy-gw2analytics_api.*]
ignore_missing_imports = True

[mypy-gw2_analytics.*] ignore_missing_imports = True

[mypy-gw2_core.*]
ignore_missing_imports = True

[mypy-gw2_evtc_parser.*]
ignore_missing_imports = True

[mypy-gw2_api_client.*]
ignore_missing_imports = True
