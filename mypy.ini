[mypy]
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
python_version = 3.12
plugins = pydantic.mypy

# Files we ignore globally (newline-separated regexes).
# v0.10.5 dep-cycle: appended |.*conftest\.py — pytest's conftest.py
# files in apps/api/tests/ + libs/*/tests/ all share the bare module
# name "conftest", which mypy's module-resolution flags as a duplicate
# (e.g. "Duplicate module named 'conftest' (also at libs/gw2_core/
# tests/conftest.py)"). pytest discovers conftest.py by FILENAME
# convention, NOT by module-import, so excluding it from mypy
# (which uses import-based module resolution) is the surgical fix.
# The regex covers future conftest.py files added by new workspace
# members — no need to remember to add new paths when a new
# libs/foo/tests/conftest.py lands.
exclude = (?x)(\.venv|node_modules|web/|build/|dist/|apps/api/alembic/versions/|.*conftest\.py)

# Tests can have looser typing
[mypy-tests.*]
disallow_untyped_defs = False

# External libs sometimes lack complete annotations
[mypy-pydantic.*]
ignore_missing_imports = True

# Workspace packages (`uv` workspace == editable-installed into the venv).
# When mypy runs from `apps/api/tests/*.py` it cannot resolve cross-package
# imports even though pytest can (pytest's rootdir-discovery adds tests/
# to sys.path; mypy consults the type-stub path instead). Permitting
# `ignore_missing_imports` here lets e2e test files import the FastAPI
# app registry + the cross-account timeline aggregator without inline
# `# type: ignore[import-not-found]`. Audit + commit-message context:
# advisor-plans/F2 (workspace-stub patch).[mypy-gw2analytics_api.*]
ignore_missing_imports = True

[mypy-gw2_analytics.*] ignore_missing_imports = True

[mypy-gw2_core.*]
ignore_missing_imports = True

[mypy-gw2_evtc_parser.*]
ignore_missing_imports = True

[mypy-gw2_api_client.*]
ignore_missing_imports = True
