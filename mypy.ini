[mypy]
# v0.10.5 dep-cycle Phase 1C: explicit_package_bases=True tells
# mypy to treat each top-level wd on the CLI as a separate package
# root for module resolution (`apps.api.tests.conftest` vs
# `libs.gw2_core.tests.conftest`). Resolves the duplicate
# "conftest" module-name collision without needing the brittle
# regex exclude that was added in Phase 1B (and didn't work --
# mypy collects conftest.py before exclude is applied at the
# CLI level). No CI workflow change needed; works identically
# in local pre-commit `uv run mypy libs apps --no-incremental`
# and CI's identical invocation pattern.
explicit_package_bases = True
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
python_version = 3.12
plugins = pydantic.mypy

# Files we ignore globally (newline-separated regexes).
# v0.10.5 dep-cycle Phase 1C: dropped the conftest regex --
# explicit_package_bases=True (above) is the canonical fix for
# the duplicate-conftest collision (the regex was brittle --
# mypy collected conftest.py before exclude was applied at
# CLI level).
exclude = (?x)(\.venv|node_modules|web/|build/|dist/|apps/api/alembic/versions/)

# Tests can have looser typing
[mypy-tests.*]
disallow_untyped_defs = False

# External libs sometimes lack complete annotations
[mypy-pydantic.*]
ignore_missing_imports = True

# Workspace packages (`uv` workspace == editable-installed into the venv).
# When mypy runs from `apps/api/tests/*.py` it cannot resolve cross-package
# imports even though pytest can (pytest's rootdir-discovery adds tests/
# to sys.path; mypy consults the type-stub path instead). Permitting
# `ignore_missing_imports` here lets e2e test files import the FastAPI
# app registry + the cross-account timeline aggregator without inline
# `# type: ignore[import-not-found]`. Audit + commit-message context:
# advisor-plans/F2 (workspace-stub patch).

[mypy-gw2analytics_api.*]
ignore_missing_imports = True

[mypy-gw2_analytics.*] ignore_missing_imports = True

[mypy-gw2_core.*]
ignore_missing_imports = True

[mypy-gw2_evtc_parser.*]
ignore_missing_imports = True

[mypy-gw2_api_client.*]
ignore_missing_imports = True
