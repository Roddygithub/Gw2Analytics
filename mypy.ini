[mypy]
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
python_version = 3.12
plugins = pydantic.mypy

# Files we ignore globally (newline-separated regexes).
exclude = (?x)(\.venv|node_modules|web/|build/|dist/|apps/api/alembic/versions/)

# Tests can have looser typing
[mypy-tests.*]
disallow_untyped_defs = False

# External libs sometimes lack complete annotations
[mypy-pydantic.*]
ignore_missing_imports = True
