# Phase 0 stub for Alembic config.
# A real `alembic init` will be run in Phase 2 when the first migration is needed.
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql://gw2analytics:gw2analytics@localhost:5432/gw2analytics

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
