[project]
name = "gw2_analytics"
version = "0.4.0"
description = "Multi-level WvW combat analytics (single / multi-fight / per-player)."
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "GW2Analytics team" }]
dependencies = [
    "pydantic>=2.9",
    "gw2_core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gw2_analytics"]

[tool.uv]
package = true
