packages: []

allowBuilds:
  esbuild: true
  sharp: true

# Security overrides: force patched versions of transitive dependencies
# to silence `pnpm audit` findings. These can be removed once Next.js
# and Vitest update their own dependency ranges to pull in the patched
# versions natively.
overrides:
  vite: 6.4.3
  esbuild: 0.25.12
  postcss: 8.5.16
