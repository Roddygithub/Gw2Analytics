services:
  postgres:
    image: postgres:16-alpine
    container_name: gw2a-postgres
    environment:
      POSTGRES_USER: gw2analytics
      POSTGRES_PASSWORD: gw2analytics
      POSTGRES_DB: gw2analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gw2analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gw2a-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gw2analytics
      MINIO_ROOT_PASSWORD: gw2analytics-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gw2a-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  miniodata:
