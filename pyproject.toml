[project]
name = "gw2analytics-root"
version = "0.0.1"
description = "GW2 WvW combat analytics platform (monorepo root)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }

# Pure virtual project: declares dev-tool groups only.
# Each workspace member keeps its own production deps in its own [project].

[dependency-groups]
dev = [
    "ruff>=0.7",
    "mypy>=1.13",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pre-commit>=4.0",
    "httpx>=0.27",     # for tests
]

[tool.uv.workspace]
members = [
    "libs/gw2_core",
    "libs/gw2_evtc_parser",
    "libs/gw2_analytics",
    "libs/gw2_api_client",
    "apps/api",
]

[tool.uv.sources]
gw2_core = { workspace = true }
gw2_evtc_parser = { workspace = true }
gw2_analytics = { workspace = true }
gw2_api_client = { workspace = true }

[tool.uv]
package = false

# ---------------------------------------------------------------------------
# Ruff: project-wide lint config (applies to every workspace member).
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# Sensible default rule set; members can extend via their own pyproject.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security; S105 silenced per-file for the dev config)
    "RUF", # ruff-specific
]

[tool.ruff.lint.per-file-ignores]
# apps/api/src/gw2analytics_api/config.py holds the dev-only sentinels
# (database_url, minio_secret_key) that the docker-compose stack
# depends on. ``# TODO(#security): move to env-only in production``.
"apps/api/src/gw2analytics_api/config.py" = ["S105"]
# Tests can be more relaxed on naming + bandit (random data, asserts, etc.).
"**/tests/**/*.py" = ["S101", "S105", "S311", "PLR2004", "N801"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ---------------------------------------------------------------------------
# Mypy: project-wide type-check config. Per-package overrides live in
# each member's pyproject.toml.
# ---------------------------------------------------------------------------

[tool.mypy]
python_version = "3.12"
strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_optional = true
check_untyped_defs = true
# ``fastapi_mcp`` is imported in main.py and used at runtime
# (FastApiMCP(app).mount()) but ships no type stubs. Silence the
# import-untyped warning so the project's own mypy run stays clean.
# The pre-commit mypy hook reads this same pyproject.toml.

[[tool.mypy.overrides]]
module = ["fastapi_mcp"]
ignore_missing_imports = true
